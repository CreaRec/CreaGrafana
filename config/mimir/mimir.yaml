# Mimir monolithic + filesystem. Fine for a single replica on one host.
# Move to object storage before scaling replicas.
multitenancy_enabled: false

target: all

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

ingester:
  ring:
    replication_factor: 1
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

store_gateway:
  sharding_ring:
    replication_factor: 1
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

compactor:
  data_dir: /data/compactor
  sharding_ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

limits:
  compactor_blocks_retention_period: 336h
  max_global_series_per_user: 200000
  ingestion_rate: 20000
  ingestion_burst_size: 100000
  out_of_order_time_window: 10m

memberlist:
  join_members: []
